{% extends "base.html" %}
{% block title %}Voiceover Generator{% endblock %}
{% block content %}
<div class="page-header">
  <h1>&#127897; Voiceover Generator</h1>
  <p class="page-subtitle">Convert your script to audio with ElevenLabs</p>
</div>
<div class="two-col">
  <div class="card">
    <h3>Generate Voiceover</h3>
    <form method="POST" action="/voiceover/generate">
      <div class="form-group">
        <label>Script Text</label>
        <textarea name="script" class="form-textarea" rows="10" placeholder="Paste your script here..."></textarea>
      </div>
      <button class="btn btn-primary">Generate Voiceover</button>
    </form>
  </div>
  {% if result %}
  <div class="card">
    <h3>&#10003; Voiceover Generated</h3>
    <audio controls class="audio-player">
      <source src="/outputs/{{ result.filename }}" type="audio/mpeg">
    </audio>
    <a href="/outputs/{{ result.filename }}" download class="btn btn-sm">&#11015; Download MP3</a>
  </div>
  {% endif %}
</div>
{% endblock %}
